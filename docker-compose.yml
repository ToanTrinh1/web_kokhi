services:
  postgres:
    image: postgres:16-alpine
    container_name: web-kokhi-postgres
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-web_kokhi}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-web_kokhi}"
      POSTGRES_DB: "${POSTGRES_DB:-web_kokhi}"
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-web_kokhi} -d ${POSTGRES_DB:-web_kokhi}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: web-kokhi-backend:latest
    container_name: web-kokhi-backend
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    environment:
      ADDR: ":8080"
      SIMULATOR_INTERVAL_SEC: "${SIMULATOR_INTERVAL_SEC:-3}"
      DATABASE_URL: "postgres://${POSTGRES_USER:-web_kokhi}:${POSTGRES_PASSWORD:-web_kokhi}@postgres:5432/${POSTGRES_DB:-web_kokhi}?sslmode=disable"
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN:-}"
      STATION_API_KEY: "${STATION_API_KEY:-}"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

volumes:
  pgdata:
